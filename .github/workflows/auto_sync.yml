name: Generate PEA Data

on:
  push:
    branches: [ main ]
    paths:
      - 'cic0.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run parser
        run: python run_cic0.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add js/data.js
          git commit -m "Auto-update js/data.js" -a || exit 0
          git push
