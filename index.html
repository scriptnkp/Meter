<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบบันทึกงานมิเตอร์ PEA</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="dot"></span> ระบบบันทึกงานมิเตอร์ PEA</div>
  <nav class="tabs">
    <button id="tab-home" class="active">หน้าแรก</button>
    <button id="tab-history">ประวัติ</button>
    <button id="tab-dashboard">Dashboard</button>
  </nav>
</header>

<main>

  <!-- หน้าแรก: เลือกหน่วยงาน -->
  <section id="screen-home" class="screen active">
    <h1 class="page-title">เลือกหน่วยงาน</h1>
    <div id="unit-grid" class="unit-grid"></div>
  </section>

  <!-- เลือกประเภทงาน -->
  <section id="screen-menu" class="screen">
    <div class="crumb"><button id="back-to-units">‹ หน่วยงาน</button></div>
    <h1 class="page-title" id="menu-unit-name"></h1>
    <div class="menu-grid">
      <button class="menu-card" data-type="cut">
        <span class="icon">✂️</span> ตัด
        <span class="sub">บันทึกงานตัดมิเตอร์</span>
      </button>
      <button class="menu-card" data-type="reconnect">
        <span class="icon">🔌</span> ต่อ
        <span class="sub">บันทึกงานต่อมิเตอร์</span>
      </button>
      <button class="menu-card" data-type="remove">
        <span class="icon">📦</span> ถอนมิเตอร์
        <span class="sub">บันทึกการถอนมิเตอร์</span>
      </button>
      <button class="menu-card" data-type="over90">
        <span class="icon">⏱️</span> เกิน 90 วัน
        <span class="sub">รายชื่อผู้ใช้ไฟที่ถูกงดจ่ายเกิน 90 วัน</span>
      </button>
    </div>
  </section>

  <!-- ฟอร์มบันทึกงาน -->
  <section id="screen-form" class="screen">
    <div class="crumb"><button id="back-to-menu">‹ ประเภทงาน</button></div>
    <h1 class="page-title"><span id="form-unit-name"></span> · <span id="form-work-label"></span></h1>

    <form id="work-form" class="work-form">
      <div class="field-row">
        <div class="field">
          <label for="f-pea-old">หมายเลข PEA เดิม</label>
          <input id="f-pea-old" list="pea-options" placeholder="เลือกจากรายการหรือกรอกเอง" autocomplete="off">
          <datalist id="pea-options"></datalist>
        </div>
        <div class="field" id="field-meter-old">
          <label for="f-meter-old">หน่วยเดิม</label>
          <input id="f-meter-old" placeholder="หน่วยเดิม">
        </div>
      </div>

      <div class="field-row">
        <div class="field" id="field-meter-new">
          <label for="f-meter-new">หมายเลขมิเตอร์ใหม่</label>
          <input id="f-meter-new" placeholder="หมายเลขมิเตอร์ใหม่">
        </div>
        <div class="field" id="field-pea-new">
          <label for="f-pea-new">หน่วยใหม่</label>
          <input id="f-pea-new" placeholder="กรณีเปลี่ยน/ต่อมิเตอร์ใหม่">
        </div>
      </div>

      <div class="field" id="field-meter-unit">
        <label for="f-meter-unit">หน่วยมิเตอร์</label>
        <input id="f-meter-unit" placeholder="หน่วยมิเตอร์ (ตัวเลขหน่วยล่าสุดที่อ่านได้)">
      </div>

      <div class="field">
        <label for="f-customer">ชื่อ-สกุลผู้ใช้ไฟฟ้า</label>
        <input id="f-customer" placeholder="ชื่อ-สกุล">
      </div>

      <div class="field">
        <label for="f-address">สถานที่ใช้ไฟฟ้า</label>
        <textarea id="f-address" rows="2" placeholder="ที่อยู่"></textarea>
      </div>

      <div class="field">
        <label for="f-coords">พิกัด (lat,lng)</label>
        <div class="coord-row">
          <input id="f-coords" placeholder="กดปุ่มเพื่อดึงพิกัด หรือกรอกเอง">
          <button type="button" id="pick-coords-btn" class="btn-icon">📍 ดึงพิกัด</button>
        </div>
      </div>

      <div class="field">
        <label>ภาพถ่ายหน้างาน (เลือกได้หลายรูป)</label>
        <label class="photo-area">
          แตะเพื่อเลือกรูปภาพ — ระบบจะบีบอัดให้ไม่เกิน 1MB อัตโนมัติ
          <input type="file" id="photo-input" accept="image/*" multiple capture="environment" style="display:none">
        </label>
        <div id="photo-preview" class="photo-preview"></div>
      </div>

      <div class="field">
        <label for="f-note">หมายเหตุ</label>
        <textarea id="f-note" rows="2" placeholder="หมายเหตุเพิ่มเติม (ถ้ามี)"></textarea>
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">บันทึกข้อมูล</button>
      <div id="form-status" class="status-msg"></div>
    </form>
  </section>

  <!-- ประวัติ -->
  <section id="screen-history" class="screen">
    <h1 class="page-title">ประวัติการบันทึก</h1>
    <p style="color:var(--text-soft); font-size:0.85rem;">แตะรายการเพื่อแก้ไข</p>
    <div id="history-list" class="history-list"></div>
  </section>

  <!-- Dashboard -->
  <section id="screen-dashboard" class="screen">
    <h1 class="page-title">สรุปภาพรวม</h1>
    <div id="dash-grid" class="dash-grid"></div>
    <h2 class="section-title">แผนที่จุดปฏิบัติงาน</h2>
    <div class="map-legend">
      <span><span class="dot" style="background:#c0392b"></span> ตัด</span>
      <span><span class="dot" style="background:#2f9e57"></span> ต่อ</span>
      <span><span class="dot" style="background:#5b2c83"></span> ถอนมิเตอร์</span>
      <span><span class="dot" style="background:#e0922f"></span> เกิน 90 วัน</span>
    </div>
    <div id="dash-map-wrap" style="border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px;">
      <div id="dash-map" style="height:400px;width:100%;background:#eee;"></div>
    </div>
    <p style="font-size:0.78rem;color:var(--text-soft);">แสดงเฉพาะรายการที่มีพิกัด · แตะหมุดเพื่อดูรายละเอียด</p>
  </section>

  <p id="last-updated" class="last-updated"></p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GGnk=" crossorigin="anonymous"></script>
<script src="js/app.js"></script>
</body>
</html>
