<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกงานมิเตอร์ PEA</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-badge">PEA</span>
      บันทึกงานมิเตอร์
    </div>
    <nav class="topbar-nav">
      <button id="tab-home" class="active">งาน</button>
      <button id="tab-history">ประวัติ</button>
      <button id="tab-dashboard">Dashboard</button>
    </nav>
  </div>
</header>

<main>

  <!-- หน้าแรก: เลือกหน่วยงาน -->
  <section id="screen-home" class="screen active">
    <div class="page-header">
      <h1>เลือกหน่วยงาน</h1>
      <p>หน่วยงานที่มีในรายงาน ณ วันที่อัปเดตล่าสุด</p>
    </div>
    <div id="unit-list" class="unit-list"></div>
  </section>

  <!-- เลือกประเภทงาน -->
  <section id="screen-menu" class="screen">
    <div class="crumb-row">
      <button id="back-to-units">หน่วยงาน</button>
      <span class="sep">›</span>
      <span id="menu-unit-name"></span>
    </div>
    <div class="page-header"><h1>เลือกประเภทงาน</h1></div>
    <div class="work-tabs">
      <button class="work-tab" data-type="cut">
        <span class="tab-icon">✂️</span>ตัด
      </button>
      <button class="work-tab" data-type="reconnect">
        <span class="tab-icon">🔌</span>ต่อ
      </button>
      <button class="work-tab" data-type="remove">
        <span class="tab-icon">📦</span>ถอน
      </button>
      <button class="work-tab" data-type="over90">
        <span class="tab-icon">⏱</span>เกิน 90 วัน
      </button>
    </div>
  </section>

  <!-- ฟอร์มบันทึกงาน -->
  <section id="screen-form" class="screen">
    <div class="crumb-row">
      <button id="back-to-menu">ประเภทงาน</button>
      <span class="sep">›</span>
      <span id="form-work-label"></span>
    </div>
    <div class="page-header">
      <h1 id="form-unit-name"></h1>
    </div>

    <form id="work-form">
      <!-- ส่วนที่ 1: มิเตอร์ -->
      <div class="form-card" style="margin-bottom:12px;">
        <div class="form-section-head">ข้อมูลมิเตอร์</div>
        <div class="form-body">
          <div class="field-row">
            <div class="field">
              <label>หมายเลข PEA เดิม</label>
              <input id="f-pea-old" list="pea-options" placeholder="เลือกหรือกรอกเอง" autocomplete="off">
              <datalist id="pea-options"></datalist>
            </div>
            <div class="field" id="field-meter-old">
              <label>หน่วยเดิม</label>
              <input id="f-meter-old" placeholder="หน่วยเดิม">
            </div>
          </div>
          <div class="field-row" id="row-new-fields">
            <div class="field" id="field-meter-new">
              <label>หมายเลขมิเตอร์ใหม่</label>
              <input id="f-meter-new" placeholder="หมายเลขมิเตอร์ใหม่">
            </div>
            <div class="field" id="field-pea-new">
              <label>หน่วยใหม่</label>
              <input id="f-pea-new" placeholder="หน่วยใหม่">
            </div>
          </div>
          <div class="field" id="field-meter-unit">
            <label>หน่วยมิเตอร์</label>
            <input id="f-meter-unit" placeholder="ตัวเลขหน่วยล่าสุดที่อ่านได้">
          </div>
        </div>
      </div>

      <!-- ส่วนที่ 2: ผู้ใช้ไฟ -->
      <div class="form-card" style="margin-bottom:12px;">
        <div class="form-section-head">ผู้ใช้ไฟฟ้า</div>
        <div class="form-body">
          <div class="field">
            <label>ชื่อ-สกุล</label>
            <input id="f-customer" placeholder="ชื่อ-สกุลผู้ใช้ไฟฟ้า">
          </div>
          <div class="field">
            <label>สถานที่ใช้ไฟฟ้า</label>
            <textarea id="f-address" placeholder="ที่อยู่"></textarea>
          </div>
          <div class="field">
            <label>พิกัด</label>
            <div class="input-group">
              <input id="f-coords" placeholder="lat,lng — กดดึงอัตโนมัติหรือกรอกเอง">
              <button type="button" id="pick-coords-btn" class="btn-inline">📍 ดึงพิกัด</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ส่วนที่ 3: รูปภาพและหมายเหตุ -->
      <div class="form-card">
        <div class="form-section-head">รูปภาพและหมายเหตุ</div>
        <div class="form-body">
          <div class="field">
            <label>ภาพถ่ายหน้างาน</label>
            <label class="photo-drop">
              <span class="drop-icon">📷</span>
              แตะเพื่อเลือกรูป — บีบอัดอัตโนมัติ ≤ 1MB
              <input type="file" id="photo-input" accept="image/*" multiple capture="environment" style="display:none">
            </label>
            <div id="photo-preview" class="photo-previews"></div>
          </div>
          <div class="field">
            <label>หมายเหตุ</label>
            <textarea id="f-note" placeholder="หมายเหตุเพิ่มเติม (ถ้ามี)"></textarea>
          </div>
        </div>
        <div class="form-footer">
          <button type="submit" id="submit-btn" class="btn-primary">บันทึกข้อมูล</button>
          <span id="form-status" class="status-msg"></span>
        </div>
      </div>
    </form>
  </section>

  <!-- ประวัติ -->
  <section id="screen-history" class="screen">
    <div class="page-header">
      <h1>ประวัติการบันทึก</h1>
      <p>แตะรายการเพื่อแก้ไข</p>
    </div>
    <div id="history-list"></div>
  </section>

  <!-- Dashboard -->
  <section id="screen-dashboard" class="screen">
    <div class="page-header"><h1>Dashboard</h1></div>

    <div class="dash-section">
      <h2>ยอดรวมที่บันทึกแล้ว</h2>
      <div id="dash-submitted" class="stat-grid"></div>
    </div>

    <div class="dash-section">
      <h2>ข้อมูลจากรายงาน PEA (cic0)</h2>
      <div id="dash-cic0" class="stat-grid"></div>
    </div>

    <div class="dash-section">
      <h2>แผนที่จุดปฏิบัติงาน</h2>
      <div class="map-legend" id="map-legend">
        <div class="map-legend-item"><span class="map-legend-dot" style="background:#dc2626"></span>ตัด</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:#16a34a"></span>ต่อ</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:#7c3aed"></span>ถอน</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:#d97706"></span>เกิน 90 วัน</div>
      </div>
      <div class="map-wrap">
        <div id="dash-map"></div>
      </div>
    </div>
  </section>

  <p id="last-updated" class="last-updated"></p>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GGnk=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
